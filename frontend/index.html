<!DOCTYPE html>
<html>
<head>
<title>Test App</title>
</head>

<body>

<h1>Simple App</h1>

<button onclick="load()">Get Greeting</button>

<p id="result"></p>

<script>

async function load() {

let r = await fetch("/api/greeting")
let data = await r.json()

document.getElementById("result").innerText = data.message

}

</script>

</body>
</html>
