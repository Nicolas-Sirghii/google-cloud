<!DOCTYPE html>
<html>
<head>
    <title>EasyRetain</title>
</head>
<body>
    <h1>Hello from my Google Cloud VM 🚀</h1>
    <p>If you see this, HTTPS works!</p>

    <hr>

    <h2>Backend Message:</h2>
    <div id="backend-message">Loading...</div>

    <script>
        async function fetchBackendMessage() {
            try {
                const response = await fetch("/api/hello");
                const data = await response.json();
                document.getElementById("backend-message").textContent = data.message;
            } catch (error) {
                document.getElementById("backend-message").textContent = "Failed to fetch message.";
                console.error("Error fetching backend message:", error);
            }
        }

        fetchBackendMessage();
    </script>
</body>
</html>
